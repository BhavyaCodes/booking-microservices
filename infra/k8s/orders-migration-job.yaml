apiVersion: batch/v1
kind: Job
metadata:
  name: orders-migration
spec:
  # ttlSecondsAfterFinished: 100
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres-orders
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z orders-postgres-srv 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: migrate-db-orders
          image: booking-dev-orders:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ORDERS_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: booking-secrets
                  key: ORDERS_POSTGRES_PASSWORD
            - name: ORDERS_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: booking-secrets
                  key: ORDERS_POSTGRES_USER
            - name: ORDERS_POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: booking-secrets
                  key: ORDERS_POSTGRES_DB
          command:
            - bun
            - run
            - drizzle-kit:migrate-dev
