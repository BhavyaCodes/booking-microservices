apiVersion: batch/v1
kind: Job
metadata:
  name: tickets-migration
spec:
  # ttlSecondsAfterFinished: 30
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres-tickets
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z tickets-postgres-srv 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: migrate-db-tickets
          image: booking-dev-tickets:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TICKETS_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: booking-secrets
                  key: TICKETS_POSTGRES_PASSWORD
            - name: TICKETS_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: booking-secrets
                  key: TICKETS_POSTGRES_USER
            - name: TICKETS_POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: booking-secrets
                  key: TICKETS_POSTGRES_DB
          command:
            - bun
            - run
            - drizzle-kit:migrate-dev
